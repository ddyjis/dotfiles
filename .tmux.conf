# scrollback size
set -g history-limit 10000

################################
# Keybinds
###############################

# Changing ctrl b to ctrl a as the command button
unbind C-b
set -g prefix C-a

# set first window to index 1 (not 0) to map more to the keyboard layout
set -g base-index 1
set -g pane-base-index 1

# pass through xterm keys
set -g xterm-keys on

# Keep your finger on ctrl, or don't, same result
bind-key C-d detach-client
bind-key C-p paste-buffer

# Redraw the client (if interrupted by wall, etc)
bind R refresh-client

# reload tmux config with ctrl + a + r
unbind r
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux config.'

# Vertical splits with \ or C-\
unbind '\'
unbind 'C-\'
bind-key '\' split-window -h
bind-key 'C-\' split-window -h

# Horizontal splits with v or C-h
unbind '-'
unbind 'C--'
bind-key '-' split-window
bind-key 'C--' split-window

# Using the mouse to switch panes
set -g mouse on

# Ctrl - t or t new window
unbind t
unbind C-t
bind-key t new-window
bind-key C-t new-window

# Ctrl - w or w to kill panes
unbind w
unbind C-w
bind-key w kill-pane
bind-key C-w kill-pane

# C + control q to kill session
unbind q
unbind C-q
bind-key q kill-session
bind-key C-q kill-session

# status bar theme
set -g status 'on'
set -g status-justify 'centre'
set -g status-left '#[fg=#5D4037,bg=terminal]#[bg=#5D4037,fg=#EFEFEF] #(whoami) #[fg=#5D4037,bg=terminal] '
set -g status-right-length '100'
set -g status-right '#[fg=#5D4037,bg=terminal]#[bg=#5D4037,fg=#EFEFEF] #T #(LC_TIME=ja_JP date "+%%b 月 %%d 日 %%A %%H : %%M") #[fg=#5D4037,bg=terminal] '
set -g status-bg 'terminal'
set -g status-fg '#A1887F'
setw -g window-status-format '#[fg=#A1887F,bg=terminal]#[fg=#EFEFEF,bg=#A1887F] #I  #W #[fg=#A1887F,bg=terminal] '
setw -g window-status-current-format '#[fg=#5D4037,bg=terminal]#[fg=#EFEFEF,bg=#5D4037] #I  #W #[fg=#5D4037,bg=terminal] '
